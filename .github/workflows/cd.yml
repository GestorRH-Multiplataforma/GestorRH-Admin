name: CD Pipeline Admin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build, Push y Deploy en Oracle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx (soporte ARM64)
        uses: docker/setup-buildx-action@v3

      - name: Construir y subir imagen Docker ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/gestorrh-multiplataforma/gestorrh-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Desplegar en servidor Oracle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/gestorrh

            echo "Descargando nueva imagen de Admin..."
            docker pull ghcr.io/gestorrh-multiplataforma/gestorrh-admin:latest

            echo "Reiniciando servicios..."
            docker compose -f docker-compose.prod.yml up -d --no-build --force-recreate admin

            echo "Limpiando imágenes antiguas..."
            docker image prune -f

            echo "Deploy Admin completado"
